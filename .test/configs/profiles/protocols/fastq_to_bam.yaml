steps:
  fastq_qc: true
  trimming: true
  alignment: true
  bam_filter: true
  coverage: true
  multiqc: true

alignment:
  tool: bowtie2

coverage:
  tool: deeptools
  rna_strand_mode: none

resources:
  fastqc:
    threads: 1
    mem_mb: 512
    runtime_min: 15
  cutadapt:
    threads: 2
    mem_mb: 1024
    runtime_min: 30
  bowtie2:
    threads: 2
    mem_mb: 2048
    runtime_min: 60
  samtools_filter:
    threads: 2
    mem_mb: 1024
    runtime_min: 30
  samtools_qc:
    threads: 1
    mem_mb: 512
    runtime_min: 15
  deeptools:
    threads: 2
    mem_mb: 1024
    runtime_min: 30
  multiqc:
    threads: 1
    mem_mb: 512
    runtime_min: 15

