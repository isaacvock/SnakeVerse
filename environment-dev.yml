# environment-dev.yml
name: snakeverse-dev
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - snakemake
  - snakedeploy
  - pyyaml
  - jsonschema
  - pandas
  - pytest
  - pytest-cov
  - ruff
  - black
  - snakefmt
  - yamllint
  - shellcheck
  - graphviz

  # Bioinformatics tools useful for local smoke tests.
  # The real workflow should still use per-rule conda envs.
  - fastqc
  - fastp
  - cutadapt
  - sra-tools
  - bowtie2
  - bwa-mem2
  - star
  - samtools
  - subread
  - gffread
  - salmon
  - rsem
  - deeptools
  - bedtools
  - macs3
  - multiqc
