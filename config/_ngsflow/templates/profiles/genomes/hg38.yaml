# Example hg38 genome profile.
# Replace these paths with local reference FASTA/GTF/index locations.
genome:
  name: hg38
  fasta: resources/genomes/hg38/hg38.fa
  chrom_sizes: resources/genomes/hg38/hg38.chrom.sizes
  gtf: resources/genomes/hg38/gencode.annotation.gtf
  # Leave an index path blank to have SnakeVerse build it under results/<run>/reference/.
  bowtie2_index: ""
  star_index: ""
  bwa_mem2_index: ""
  effective_genome_size: 2913022398
