# Editable featureCounts profile.
tool: featurecounts
version: "subread"

params:
  feature_type: exon
  attribute_type: gene_id
  # 0 = unstranded, 1 = stranded, 2 = reversely stranded.
  strand: 0
  paired_end: true
  require_both_ends_mapped: false
  count_multimapping_reads: false
  count_overlapping_features: false

# Appended verbatim to the featureCounts command.
extra: ""

