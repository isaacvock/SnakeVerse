# Protocol profile for bulk RNA-seq with STAR and featureCounts.
steps:
  fastq_qc: true
  trimming: true
  alignment: true
  bam_filter: true
  bam_qc: true
  coverage: true
  gene_counts: true
  multiqc: true

trimming:
  # Set to fastp or cutadapt.
  tool: fastp

alignment:
  tool: star

coverage:
  tool: deeptools
  # Use sample-sheet strandedness for deepTools --filterRNAstrand when applicable.
  # Set to none, forward, reverse, or sample.
  rna_strand_mode: sample

resources:
  fastqc:
    threads: 1
    mem_mb: 1024
    runtime_min: 30
  fastp:
    threads: 4
    mem_mb: 4096
    runtime_min: 120
  cutadapt:
    threads: 4
    mem_mb: 4096
    runtime_min: 120
  sra_tools:
    threads: 4
    mem_mb: 4096
    runtime_min: 240
  star:
    threads: 12
    mem_mb: 32000
    runtime_min: 360
  star_index:
    threads: 8
    mem_mb: 32000
    runtime_min: 480
  bowtie2:
    threads: 8
    mem_mb: 8192
    runtime_min: 240
  bowtie2_index:
    threads: 4
    mem_mb: 8192
    runtime_min: 240
  bwa_mem2:
    threads: 8
    mem_mb: 8192
    runtime_min: 240
  bwa_mem2_index:
    threads: 4
    mem_mb: 8192
    runtime_min: 240
  samtools_filter:
    threads: 4
    mem_mb: 4096
    runtime_min: 120
  samtools_qc:
    threads: 2
    mem_mb: 2048
    runtime_min: 60
  featurecounts:
    threads: 8
    mem_mb: 8192
    runtime_min: 180
  salmon:
    threads: 8
    mem_mb: 8192
    runtime_min: 180
  rsem_prepare_reference:
    threads: 4
    mem_mb: 8192
    runtime_min: 180
  rsem:
    threads: 8
    mem_mb: 8192
    runtime_min: 180
  deeptools:
    threads: 4
    mem_mb: 4096
    runtime_min: 120
  multiqc:
    threads: 1
    mem_mb: 2048
    runtime_min: 60
