assays:
  generic:
    description: "Generic FASTQ-to-BAM workflow for custom assays."
    presets:
      fastq_to_bam:
        description: "Vanilla preprocessing, alignment, BAM filtering, optional tracks."
        run_template: runs/generic_fastq_to_bam.yaml
        sample_template: samples/generic.tsv
        profiles:
          assays:
            - generic.yaml
          protocols:
            - fastq_to_bam.yaml
          tools:
            - fastqc.yaml
            - cutadapt.yaml
            - bowtie2.yaml
            - bwa_mem2.yaml
            - star.yaml
            - samtools.yaml
            - deeptools.yaml
            - multiqc.yaml
          genomes:
            - hg38.yaml

  rnaseq:
    description: "Bulk RNA-seq workflow."
    presets:
      star_featurecounts:
        description: "STAR alignment plus featureCounts gene quantification."
        run_template: runs/rnaseq_star_featurecounts.yaml
        sample_template: samples/rnaseq.tsv
        profiles:
          assays:
            - rnaseq.yaml
          protocols:
            - rnaseq_star_featurecounts.yaml
          tools:
            - fastqc.yaml
            - cutadapt.yaml
            - bowtie2.yaml
            - bwa_mem2.yaml
            - star.yaml
            - samtools.yaml
            - featurecounts.yaml
            - deeptools.yaml
            - multiqc.yaml
          genomes:
            - hg38.yaml

  atacseq:
    description: "ATAC-seq chromatin accessibility workflow."
    presets:
      encode4_bowtie2_macs2:
        description: "ENCODE4-oriented Bowtie2 alignment, filtering, MACS2 peaks, signal, and QC."
        run_template: runs/atacseq_encode4.yaml
        sample_template: samples/atacseq.tsv
        profiles:
          assays:
            - atacseq.yaml
          protocols:
            - atacseq_encode4.yaml
          tools:
            - fastqc.yaml
            - cutadapt.yaml
            - bowtie2.yaml
            - samtools.yaml
            - bedtools.yaml
            - macs2.yaml
            - deeptools.yaml
            - multiqc.yaml
          genomes:
            - hg38.yaml
